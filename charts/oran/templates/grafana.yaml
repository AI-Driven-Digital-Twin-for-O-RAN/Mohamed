{{- if .Values.grafana.enabled -}}
{{/*
  Grafana — single-replica with auto-provisioned datasource (Prometheus)
  and a pre-built O-RAN demo dashboard. The dashboard JSON lives in a
  separate ConfigMap (grafana-dashboard.yaml) so it stays readable.
*/}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oran.fullname" . }}-grafana-datasources
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        isDefault: true
        url: http://{{ include "oran.fullname" . }}-prometheus.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.prometheus.service.port }}
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oran.fullname" . }}-grafana-providers
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  providers.yaml: |-
    apiVersion: 1
    providers:
      - name: 'oran-platform'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oran.fullname" . }}-grafana
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "oran.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "oran.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: {{ include "oran.fullname" . }}-grafana-datasources
        - name: providers
          configMap:
            name: {{ include "oran.fullname" . }}-grafana-providers
        - name: dashboards
          configMap:
            name: {{ include "oran.fullname" . }}-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oran.fullname" . }}-grafana
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oran.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- if .Values.grafana.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "oran.fullname" . }}-grafana
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  {{- if .Values.grafana.ingress.className }}
  ingressClassName: {{ .Values.grafana.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.grafana.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "oran.fullname" . }}-grafana
                port:
                  number: {{ .Values.grafana.service.port }}
{{- end }}
{{- end }}
