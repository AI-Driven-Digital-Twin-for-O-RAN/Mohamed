{{/*
═══════════════════════════════════════════════════════════════════════════════
  xApp registry iteration  —  the multi-xApp pattern.

  Iterates `.Values.xapps` and renders Deployment + Service for every entry
  whose pythonService.enabled is true. Adding a 4th xApp = adding one entry
  to values.yaml + pushing the image. No template changes here.

  C xApps are NOT deployed continuously — they are spawned per-simulation as
  K8s Jobs by the controller (Phase 4F). Their image references in values.yaml
  are read by the controller via the xapp-registry ConfigMap below.
═══════════════════════════════════════════════════════════════════════════════
*/}}
{{- range $id, $x := .Values.xapps }}
{{- if and $x.enabled $x.pythonService.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oran.fullname" $ }}-{{ $id }}
  labels:
    {{- include "oran.labels" $ | nindent 4 }}
    app.kubernetes.io/component: xapp-service
    oran.farouk/xapp-id: {{ $id }}
spec:
  replicas: {{ $x.pythonService.replicas }}
  selector:
    matchLabels:
      {{- include "oran.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: xapp-service
      oran.farouk/xapp-id: {{ $id }}
  template:
    metadata:
      labels:
        {{- include "oran.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: xapp-service
        oran.farouk/xapp-id: {{ $id }}
    spec:
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: xapp-service
          image: {{ include "oran.image" (dict
                    "registry" $.Values.global.registry
                    "repo"     $x.pythonService.image.repository
                    "tag"      $x.pythonService.image.tag
                    "default"  $.Values.global.defaultTag) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $x.pythonService.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml $x.pythonService.resources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oran.fullname" $ }}-{{ $id }}
  labels:
    {{- include "oran.labels" $ | nindent 4 }}
    app.kubernetes.io/component: xapp-service
    oran.farouk/xapp-id: {{ $id }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $x.pythonService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oran.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: xapp-service
    oran.farouk/xapp-id: {{ $id }}
{{- if $x.pythonService.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "oran.fullname" $ }}-{{ $id }}
  labels:
    {{- include "oran.labels" $ | nindent 4 }}
    app.kubernetes.io/component: xapp-service
    oran.farouk/xapp-id: {{ $id }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "oran.fullname" $ }}-{{ $id }}
  minReplicas: {{ $x.pythonService.autoscaling.minReplicas }}
  maxReplicas: {{ $x.pythonService.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $x.pythonService.autoscaling.targetCPU }}
{{- end }}
{{- end }}
{{- end }}
