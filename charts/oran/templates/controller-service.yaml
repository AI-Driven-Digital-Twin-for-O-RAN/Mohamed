{{- if .Values.controller.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oran.fullname" . }}-controller
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  type: {{ .Values.controller.service.type }}
  ports:
    - port: {{ .Values.controller.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oran.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
{{- end }}
