{{- if .Values.gui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oran.fullname" . }}-gui
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: gui
spec:
  replicas: {{ .Values.gui.replicas }}
  selector:
    matchLabels:
      {{- include "oran.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gui
  template:
    metadata:
      labels:
        {{- include "oran.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gui
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gui
          image: {{ include "oran.image" (dict
                    "registry" .Values.global.registry
                    "repo"     .Values.gui.image.repository
                    "tag"      .Values.gui.image.tag
                    "default"  .Values.global.defaultTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # nginx /api/* proxies to the controller Service. The hostname
            # comes straight from the rendered controller Service name.
            - name: CONTROLLER_HOST
              value: {{ include "oran.fullname" . }}-controller
            - name: CONTROLLER_PORT
              value: {{ .Values.controller.service.port | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gui.resources | nindent 12 }}
{{- end }}
