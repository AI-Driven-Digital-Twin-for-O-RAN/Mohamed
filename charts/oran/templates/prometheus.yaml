{{- if .Values.prometheus.enabled -}}
{{/*
  Prometheus — single-replica scrape engine.
  Scrape targets are discovered via Pod/Service annotations:
    prometheus.io/scrape:  "true"
    prometheus.io/port:    "<port>"
    prometheus.io/path:    "/metrics"
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "oran.fullname" . }}-prometheus
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oran.fullname" . }}-prometheus
  labels:
    {{- include "oran.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [services, endpoints, pods, nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "oran.fullname" . }}-prometheus
  labels:
    {{- include "oran.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "oran.fullname" . }}-prometheus
subjects:
  - kind: ServiceAccount
    name: {{ include "oran.fullname" . }}-prometheus
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oran.fullname" . }}-prometheus-config
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |-
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      # Scrape every Pod whose annotation prometheus.io/scrape is "true".
      - job_name: oran-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [{{ .Release.Namespace }}]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # NOTE: target_label avoids names that the controller's own metrics
          # already use as labels (e.g. `component`, `xapp`) — otherwise
          # Prometheus rewrites the metric's label to `exported_<name>`.
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: pod_component
          - source_labels: [__meta_kubernetes_pod_label_oran_farouk_xapp_id]
            target_label: pod_xapp_id
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oran.fullname" . }}-prometheus
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "oran.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "oran.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
    spec:
      serviceAccountName: {{ include "oran.fullname" . }}-prometheus
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "oran.fullname" . }}-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oran.fullname" . }}-prometheus
  labels:
    {{- include "oran.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: {{ .Values.prometheus.service.type }}
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oran.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
{{- end }}
