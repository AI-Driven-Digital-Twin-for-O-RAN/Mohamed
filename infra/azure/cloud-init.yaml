#cloud-config
# ─────────────────────────────────────────────────────────────────────
#  cloud-init for the Azure demo VM.
#  Bootstraps Docker + k3s + helm + the repo, then runs `make` targets
#  so the VM is ready for the demo by the time SSH is open.
#
#  Hand to `az vm create --custom-data cloud-init.yaml` or the Azure
#  Portal "Custom data" field.
# ─────────────────────────────────────────────────────────────────────
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - git
  - jq
  - make
  - tini
  - lksctp-tools          # SCTP user-space tools (the package is `lksctp-tools`, not `sctp`)
  - build-essential
  - cmake
  - ninja-build
  - pkg-config
  - libsctp-dev
  - libpcap-dev
  - libsqlite3-dev
  - libxml2-dev
  - libgsl-dev
  - libgcrypt-dev
  - libssl-dev
  - autoconf
  - libtool
  - m4
  - python3-dev
  - python3-pip
  - swig
  - flex
  - bison

write_files:
  - path: /etc/profile.d/oran.sh
    permissions: '0755'
    content: |
      export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
      export PATH=$PATH:/usr/local/bin

runcmd:
  # ── Docker ────────────────────────────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu
  - systemctl enable --now docker

  # ── k3s (single-node, traefik off — chart has its own ingress) ───
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable=traefik --write-kubeconfig-mode=644" sh -

  # ── kubectl + helm ────────────────────────────────────────────────
  - |
    KUBE=$(curl -sL https://dl.k8s.io/release/stable.txt) && \
    curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/${KUBE}/bin/linux/amd64/kubectl" && \
    chmod +x /usr/local/bin/kubectl
  - curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # ── kubeconfig accessible to ubuntu ──────────────────────────────
  - mkdir -p /home/ubuntu/.kube
  - cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
  - chown -R ubuntu:ubuntu /home/ubuntu/.kube
  - chmod 600 /home/ubuntu/.kube/config

  # ── Clone the repo ───────────────────────────────────────────────
  # NOTE: this repo is private. cloud-init can't auth to GitHub. Three options:
  #   1. Make the repo public (briefly) before `az vm create`, flip back after.
  #   2. Replace the URL below with `https://<PAT>@github.com/...` (token = fine-
  #      grained PAT with Contents:Read-only on this repo).
  #   3. Provision an SSH deploy key. Mount it in `write_files:` above, then
  #      use the `git@github.com:.../Mohamed.git` SSH URL here.
  # The clone failure is non-fatal — the rest of the bootstrap completes and
  # you can finish manually by following infra/azure/MANUAL_RECOVERY.md.
  - git clone --branch main https://github.com/AI-Driven-Digital-Twin-for-O-RAN/Mohamed.git /opt/oran || echo "[oran] git clone failed — see /opt/oran-recovery.md for manual finish"
  - chown -R ubuntu:ubuntu /opt/oran 2>/dev/null || true

  # ── Marker file so `cloud-init status --wait` works ──────────────
  - touch /var/log/oran-bootstrap-done
  - echo "$(date -Iseconds) — cloud-init done. SSH in and run /opt/oran scripts." > /var/log/oran-bootstrap.log

final_message: "O-RAN demo VM ready. SSH in and run /opt/oran/tools/demo-runbook.sh"
