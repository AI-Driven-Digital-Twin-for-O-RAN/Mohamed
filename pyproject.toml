[tool.pytest.ini_options]
minversion  = "7.0"
testpaths   = ["tests"]
addopts     = "-ra --strict-markers --strict-config"
filterwarnings = [
    # Silence FastAPI/pydantic deprecation noise in tests; we test pure functions.
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
extend-select = ["E", "F", "I", "B", "UP"]
ignore        = ["E501"]   # long lines OK in tests
