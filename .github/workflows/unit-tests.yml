name: unit-tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (controller pure functions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/controller/requirements.txt

      - name: Install controller deps + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/controller/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: pytest tests/unit/ -v --cov=controller --cov-report=term-missing

      # Optional: upload coverage if you wire codecov later.
      # - uses: codecov/codecov-action@v4
