# yamllint config — relaxed rules suitable for K8s manifests, Helm
# templates, and code that uses alignment-style spacing for readability.
# https://yamllint.readthedocs.io/en/stable/rules.html
extends: default

rules:
  # K8s + Helm templates routinely produce long inline expressions.
  line-length:
    max: 200
    level: warning

  document-start:
    present: false

  indentation:
    spaces: consistent
    indent-sequences: consistent

  truthy:
    level: warning
    allowed-values: ["true", "false", "yes", "no", "on", "off"]

  # Aligned-spacing style is intentional throughout values.yaml + compose
  # (`key:    value` for column alignment, `{ a, b, c }` resource blocks).
  # Disable the spacing checks rather than fight them.
  colons: disable
  braces: disable
  brackets: disable
  commas: disable
  hyphens: disable
  empty-values: disable

  comments:
    min-spaces-from-content: 1
  comments-indentation: disable

  trailing-spaces:
    level: warning
  empty-lines:
    max: 2

ignore: |
  platform/flexric/
  platform/ns3-sim/
  platform/2d-gui/
  charts/oran/charts/
