# ════════════════════════════════════════════════════════════════════
#  docker-compose.dev.yml — supporting cast for local iteration.
#
#  Brings up: 3D GUI · FastAPI controller · GRU service · RL service
#             · InfluxDB · Grafana
#
#  NOT included:  FlexRIC · ns-3 · C xApps  (cluster-only — see Helm chart).
#
#  Usage:
#    make compose-up              # build images and start everything
#    make compose-up-detach       # same, detached
#    make compose-logs            # tail all logs
#    make compose-down            # stop and remove containers
#
#  After it's up:
#    GUI         → http://localhost:3001
#    Controller  → http://localhost:8001
#    Grafana     → http://localhost:3000
#    InfluxDB    → http://localhost:8086
# ════════════════════════════════════════════════════════════════════

x-image-tag: &image_tag ${IMAGE_TAG:-dev}

networks:
  oran:
    driver: bridge

volumes:
  influxdb_data:    {}
  grafana_data:     {}
  controller_data:  {}

services:

  # ── 3D GUI ──────────────────────────────────────────────────────────
  gui:
    image: mohamed710/oran-gui:${IMAGE_TAG:-dev}
    build:
      context: ./platform/gui
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      CONTROLLER_HOST: controller
      CONTROLLER_PORT: "8001"
    depends_on:
      controller:
        condition: service_healthy
    networks: [oran]

  # ── FastAPI controller (host-bound parts disabled in compose mode) ─
  controller:
    image: mohamed710/oran-controller:${IMAGE_TAG:-dev}
    build:
      context: ./platform/controller
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      # Compose mode: containers don't have FlexRIC/ns-3 binaries on disk,
      # so /readyz will report flexric_bin=false. /healthz still works.
      PROJECT_ROOT:     /app
      RUNTIME_CSV_HOME: /data
      RESULTS_DIR:      /data/sim-results
      DECISIONS_DB:     /data/sim_decisions.db
    volumes:
      - controller_data:/data
    networks: [oran]

  # ── GRU prediction service ─────────────────────────────────────────
  gru-service:
    image: mohamed710/xapp-gru-service:${IMAGE_TAG:-dev}
    build:
      # Build context = xapps/gru-handover/ so Dockerfile can reach model/ + artifacts/.
      context: ./xapps/gru-handover
      dockerfile: python-service/Dockerfile
    ports:
      - "5000:5000"
    environment:
      GRU_PORT: "5000"
    networks: [oran]

  # ── RL prediction service ──────────────────────────────────────────
  rl-service:
    image: mohamed710/xapp-rl-service:${IMAGE_TAG:-dev}
    build:
      context: ./xapps/rl-handover/python-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      RL_PORT: "5001"
    networks: [oran]

  # ── InfluxDB (legacy 1.8 to match existing pusher + dashboards) ────
  influxdb:
    image: influxdb:1.8-alpine
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      INFLUXDB_DB: influx
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks: [oran]

  # ── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    depends_on: [influxdb]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [oran]
